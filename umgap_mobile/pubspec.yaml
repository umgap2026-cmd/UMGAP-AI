name: umgap_mobile
description: A new Flutter project
publish_to: 'none'

version: 1.1.0+3

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.0.0
  flutter_secure_storage: ^9.0.0
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  share_plus: ^10.0.0
  path_provider: ^2.1.3
  google_sign_in: ^6.2.1
  flutter_contacts: ^1.1.9+2
  # PDF generation
  pdf: ^3.10.8

  package_info_plus: ^8.0.0
  open_file: ^3.3.2

  # Print preview & share PDF (termasuk share sheet)
  printing: ^5.12.0

  # ESC/POS command generator untuk thermal printer
  esc_pos_utils_plus: ^2.0.4
  print_bluetooth_thermal: ^1.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/images/google_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo/icon.png"
  remove_alpha_ios: true