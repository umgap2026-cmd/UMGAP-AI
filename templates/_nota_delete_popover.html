<details class="mini-pop">
  <summary class="pill-btn danger">Hapus</summary>
  <div class="pop-panel">
    <form method="post" action="/nota/{{ inv.id }}/delete" style="display:flex; flex-direction:column; gap:10px">
      <div>
        <label style="margin-bottom:8px">Stok &amp; Uang</label>
        <div class="del-radio-grid">
          <label class="del-radio">
            <input type="radio" name="mode" value="REVERSE" />
            🔄 Kembalikan stok &amp; uang
          </label>
          <label class="del-radio">
            <input type="radio" name="mode" value="KEEP" checked />
            🗑️ Hapus dari riwayat saja
          </label>
        </div>
      </div>
      <div>
        <label>Alasan Hapus</label>
        <select name="reason_template" class="nota-del-reason" required>
          <option value="SALAH_INPUT">Salah input data</option>
          <option value="DUPLIKAT">Nota duplikat</option>
          <option value="BATAL_PELANGGAN">Dibatalkan pelanggan</option>
          <option value="BATAL_PEMASOK">Dibatalkan pemasok</option>
          <option value="SALAH_JUMLAH_HARGA">Kesalahan jumlah/harga barang</option>
          <option value="UJI_COBA">Nota uji coba</option>
          <option value="LAINNYA">Lainnya…</option>
        </select>
      </div>
      <input type="text" name="reason_other" class="nota-del-reason-other" placeholder="Tulis alasan…" style="display:none" />
      <button type="submit" class="pill-btn danger" style="width:100%"
              onclick="return confirm('Hapus nota {{ inv.invoice_no }}? Nota akan hilang dari Riwayat Nota dan masuk arsip khusus owner.');">
        Hapus Nota
      </button>
    </form>
  </div>
</details>
