<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Notifikasi</title>
    <style>
      :root {
        --bg: #eef3fb;
        --card: rgba(255, 255, 255, 0.75);
        --text: #0f1c2e;
        --muted: #6b7a99;
        --line: rgba(30, 60, 120, 0.12);
        --shadow: 0 14px 40px rgba(26, 49, 92, 0.12);
        --r: 22px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 520px;
        margin: 0 auto;
        padding: 18px 14px 40px;
      }
      .top {
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid var(--line);
        border-radius: 26px;
        padding: 14px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .title {
        font-weight: 1000;
      }
      .btn {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.8);
        border-radius: 14px;
        padding: 10px 12px;
        font-weight: 900;
        cursor: pointer;
        text-decoration: none;
        color: var(--text);
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .list {
        margin-top: 14px;
        display: grid;
        gap: 12px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--r);
        padding: 14px;
        box-shadow: 0 10px 24px rgba(26, 49, 92, 0.1);
        backdrop-filter: blur(10px);
      }
      .h {
        margin: 0;
        font-weight: 1000;
      }
      .m {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.45;
      }
      .meta {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }
      .empty {
        color: var(--muted);
        font-weight: 900;
        text-align: center;
        padding: 18px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="title">Notifikasi</div>
        <a class="btn" href="/dashboard">⬅ Kembali</a>
      </div>

      <div class="list">
        {% if announcements and announcements|length > 0 %} {% for a in
        announcements %}
        <div class="card">
          <p class="h">{{ a.title }}</p>
          <p class="m">{{ a.message }}</p>
          <p class="meta">
            {{ a.created_at }} •
            <a
              class="btn"
              style="padding: 6px 10px; border-radius: 12px"
              href="/notifications/read/{{ a.id }}"
              >Tandai dibaca</a
            >
          </p>
        </div>
        {% endfor %} {% else %}
        <div class="card empty">Belum ada notifikasi.</div>
        {% endif %}
      </div>
    </div>
  </body>
</html>
